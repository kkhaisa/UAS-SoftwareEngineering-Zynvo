<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZYNVO - Sign In</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f1f2f6;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
      }
      .phone-wrapper {
        background-color: #b4b0ff;
        width: 100%;
        max-width: 410px;
        height: 100vh;
        max-height: 840px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        position: relative;
        overflow-y: auto;
      }
      .header-section {
        padding: 60px 30px 30px 30px;
        color: #3b2a82;
      }
      .form-section {
        background-color: #c3c0ff;
        flex: 1;
        border-top-left-radius: 40px;
        border-top-right-radius: 40px;
        padding: 40px 30px;
        display: flex;
        flex-direction: column;
      }
      .input-group-custom {
        position: relative;
        margin-bottom: 20px;
      }
      .input-group-custom i {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: #6c5ce7;
        font-size: 18px;
      }
      .form-control-custom {
        width: 100%;
        padding: 14px 20px 14px 55px;
        border-radius: 50px;
        border: none;
        background-color: #ffffff;
        font-size: 15px;
        color: #333;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }
      .form-control-custom:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.3);
      }
      .forgot-password {
        text-align: right;
        margin-top: -10px;
        margin-bottom: 30px;
      }
      .forgot-password a {
        color: #4a3f9e;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
      }
      .btn-signin {
        background-color: #3f3293;
        color: #ffffff;
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: bold;
        font-size: 18px;
        width: 100%;
        transition: background 0.2s;
      }
      .btn-signin:hover {
        background-color: #2d2273;
      }
      .divider-container {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 30px 0;
      }
      .divider-container::before,
      .divider-container::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #a29bfe;
      }
      .divider-text {
        background: #ffffff;
        color: #7569c7;
        padding: 6px 12px;
        font-size: 13px;
        border-radius: 50px;
        margin: 0 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      }
      .social-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 35px;
      }
      .social-box {
        background-color: #ffffff;
        width: 55px;
        height: 55px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        cursor: pointer;
        font-size: 22px;
      }
      .social-box.fb {
        color: #1877f2;
      }
      .social-box.google {
        color: #ea4335;
      }
      .social-box.apple {
        color: #000000;
      }
      .signup-prompt {
        text-align: center;
        color: #4a3f9e;
        font-size: 13px;
        margin-bottom: 10px;
      }
      .btn-signup {
        background-color: #fff2b2;
        color: #3f3293;
        border: none;
        border-radius: 14px;
        padding: 12px;
        font-weight: bold;
        font-size: 18px;
        width: 100%;
        box-shadow: 0 4px 12px rgba(255, 242, 178, 0.3);
      }
      .phone-wrapper::-webkit-scrollbar {
        width: 0px;
      }
    </style>
  </head>
  <body>
    <div class="phone-wrapper">
      <div class="header-section">
        <h1 class="fw-bold display-5">Sign In</h1>
      </div>
      <div class="form-section">
        <form id="loginForm">
          <div class="input-group-custom">
            <i class="bi bi-envelope"></i>
            <input
              type="email"
              class="form-control-custom"
              id="email"
              placeholder="Email"
              required
            />
          </div>
          <div class="input-group-custom">
            <i class="bi bi-key"></i>
            <input
              type="password"
              class="form-control-custom"
              id="password"
              placeholder="Password"
              required
            />
          </div>
          <div class="forgot-password">
            <a href="#">Forgot Password?</a>
          </div>
          <button type="submit" class="btn-signin">Sign In</button>
        </form>
        <div
          id="alertMessage"
          class="alert alert-danger d-none mt-3 small text-center"
          style="border-radius: 20px"
          role="alert"
        ></div>
        <div class="divider-container">
          <span class="divider-text">Or</span>
        </div>
        <div class="social-container">
          <div class="social-box fb"><i class="bi bi-facebook"></i></div>
          <div class="social-box google"><i class="bi bi-google"></i></div>
          <div class="social-box apple"><i class="bi bi-apple"></i></div>
        </div>
        <div class="signup-prompt">Don't have an account yet?</div>
        <button class="btn-signup" type="button">Sign Up</button>
      </div>
    </div>
    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const alertMessage = document.getElementById("alertMessage");
          alertMessage.classList.add("d-none");
          try {
            const response = await fetch("http://localhost:3000/api/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email_kampus: email, password }),
            });
            const data = await response.json();
            if (response.ok) {
              localStorage.setItem("token", data.token);
              alert("Login Berhasil!");
            } else {
              alertMessage.innerText =
                data.message || "Login Gagal, periksa kembali data Anda.";
              alertMessage.classList.remove("d-none");
            }
          } catch (error) {
            alertMessage.innerText = "Gagal terhubung ke server backend!";
            alertMessage.classList.remove("d-none");
          }
        });
    </script>
  </body>
</html>
